# ============================================================
#  tmux.conf — Alacritty + Claude Code optimized
#  Place at: ~/.tmux.conf
# ============================================================

# ── Core ─────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"   # true color in Alacritty
set -g escape-time 0                          # no delay after Esc (crucial for Claude Code)
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g base-index 1                           # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on                    # auto-renumber after closing

# ── Prefix: Ctrl+Space (friendlier than Ctrl+B) ──────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Reload config ────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Windows ──────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"   # new window in same dir
bind , command-prompt "rename-window '%%'"
bind Tab last-window                          # jump to last active window

# ── Splits (stay in current path) ────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize (repeatable) ─────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Claude Code helpers ───────────────────────────────────────
# New window and launch Claude Code immediately
bind C new-window -c "#{pane_current_path}" \; send-keys "claude" Enter

# Vertical split: editor left, Claude Code right
bind G split-window -h -c "#{pane_current_path}" \; send-keys "claude" Enter

# Background a running process (same as Ctrl+B in default tmux)
# With new prefix (Ctrl+Space), just use: prefix + z to zoom, prefix + & to kill
bind b send-keys C-b                          # pass Ctrl+B to Claude Code "background task"

# ── Copy mode (vim keys) ──────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Status bar ───────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 60

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa] "

set -g window-status-format         "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I:#W #[bg=#1e1e2e,fg=#313244]"

set -g status-right "#[fg=#6c7086]%H:%M  #[fg=#a6e3a1]#{pane_current_path}"

# ── Pane borders ─────────────────────────────────────────────
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── Bell / activity ──────────────────────────────────────────
set -g visual-activity off
set -g visual-bell off
set -g bell-action none
