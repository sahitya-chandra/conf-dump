# Enable true color
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:Tc"


# Remap new-window from 'ctrl + b + c' to 'ctrl + b + n'
unbind c
bind n new-window

# Set better history scrolling
set -g history-limit 100000

# Mouse support (enable scrolling and pane selection)
set -g mouse on

# Faster key repeat
set -s escape-time 0
set -g focus-events on

# Status bar styling
set -g status-style bg=black,fg=white
set -g status-left "#[bold] #(whoami)@#H "
set -g status-right "%Y-%m-%d %H:%M"
set -g status-interval 1

# Window and pane index starts from 1
set -g base-index 1
setw -g pane-base-index 1

# Use Vim keys for pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes with arrow keys + prefix
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Splitting panes easily
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Copy mode using Vim keys
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Fix clipboard issues (requires `xclip` or `xsel` on Linux)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# Better split focus with new windows
bind c new-window -c "#{pane_current_path}"

# Use Alt-arrow keys to switch windows
bind -n M-Left previous-window
bind -n M-Right next-window

unbind w
bind l choose-tree

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'omerxx/tmux-sessionx'

# Optional: Customize sessionx (add these if you want)
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'

# Sidebar window switcher (Ctrl-b /)

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Window switcher popup (Ctrl-b /)
bind-key / display-popup -E -w 40% -h 50% "tmux list-windows -F '#I: #W' | fzf --reverse | cut -d: -f1 | xargs -I{} tmux select-window -t {}"
